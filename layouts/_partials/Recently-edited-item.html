<ul>
{{ range  . }}
    <li>
        <h4 class="">
                <a href="{{ .Permalink }}">{{ .Title }}</a>
        </h4>
        <p class="">
           Last Edited on {{ .Lastmod.Format "2 January" }} in commit <b>"{{ with .GitInfo }}{{ .Subject }}{{ else }}[Commit description]{{ end }}"</b>, see 
             <a href="https://github.com/organization/repo/commit/{{.GitInfo.Hash}}" target="_blank">changes</a>
        </p>
    </li>
{{ end }}
</ul>
